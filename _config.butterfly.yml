# Error page
error_404:
  enable: true
  subtitle: "Page Not Found"
  background: /img/404.jpg

# Dark mode
# autoChangeMode: 1 = follow system prefers-color-scheme, 2 = follow time (6:00-18:00)
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

# Preloader (loading animation)
preloader:
  enable: true
  source: 1
  pace_css_url:

# Footer
footer:
  owner:
    enable: true
    since: 2018
  custom_text: welcome to my blog!
  copyright: true

# Aside
aside:
  enable: true
  card_author:
    enable: true
    description: "UTC+8, 16 years old forever."
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/sym1018
  card_announcement:
    enable: true
    content: This is my Blog
  card_recent_post:
    enable: true
    limit: 5
  card_tags:
    enable: true
  card_archives:
    enable: true
  card_webinfo:
    enable: true

# Translate (simplified/traditional Chinese)
translate:
  enable: true
  default: 简
  defaultEncoding: 2
  translateDelay: 0

# Word count & reading time
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# Rightside buttons
rightside_item_order:
  enable: false

# FancyBox (image lightbox)
fancybox: true

# Pjax
pjax:
  enable: true

# Theme color
theme_color:
  enable: true
  dark: '#0d0d0d'

# Busuanzi (visit counter)
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# Custom inject
inject:
  head:
    - <link rel="stylesheet" href="/css/back-btn.css">
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
    - <script src="/js/back-btn.js"></script>
    - <script src="/js/custom.js"></script>
